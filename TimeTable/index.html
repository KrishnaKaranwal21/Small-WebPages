<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DSA Quest: Master Timeline Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root {
  --bg-base:#080b12;--bg-surface:#0d1117;--bg-elevated:#111827;
  --bg-card:#131c2e;--bg-card-hover:#182034;
  --border:#1e2d45;--border-bright:#2a3f5f;
  --violet:#7c3aed;--violet-bright:#8b5cf6;--violet-glow:#6d28d9;
  --violet-dim:rgba(124,58,237,.15);--violet-pulse:rgba(139,92,246,.25);
  --emerald:#10b981;--emerald-dim:rgba(16,185,129,.15);--emerald-glow:rgba(16,185,129,.35);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,.15);--amber-glow:rgba(245,158,11,.35);
  --cyan:#06b6d4;--rose:#f43f5e;
  --text-primary:#e2e8f0;--text-secondary:#94a3b8;--text-muted:#475569;--text-dim:#334155;
  --mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
  --radius-sm:4px;--radius:8px;--radius-lg:12px;
  --shadow:0 4px 16px rgba(0,0,0,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg-base);color:var(--text-primary);min-height:100vh;overflow-x:hidden;line-height:1.6}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg-surface)}
::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--violet)}

/* ── HEADER ── */
#app-header{position:sticky;top:0;z-index:100;background:rgba(8,11,18,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.header-brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,var(--violet),var(--violet-bright));display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 12px rgba(124,58,237,.5)}
.brand-title{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.05em}
.brand-title span{color:var(--violet-bright)}
.header-stats{display:flex;align-items:center;gap:16px}
.stat-pill{font-family:var(--mono);font-size:11px;color:var(--text-secondary);background:var(--bg-elevated);border:1px solid var(--border);border-radius:99px;padding:3px 10px;display:flex;align-items:center;gap:5px}
.stat-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--emerald);box-shadow:0 0 6px var(--emerald);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.progress-bar-wrap{width:120px;height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--violet),var(--emerald));border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── LAYOUT ── */
#main-layout{display:grid;grid-template-columns:1fr 420px;gap:0;height:calc(100vh - 56px);overflow:hidden}

/* ── CALENDAR PANE ── */
#calendar-pane{overflow-y:auto;padding:20px;border-right:1px solid var(--border);background:var(--bg-surface)}
.week-block{margin-bottom:24px}
.week-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.week-badge{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--violet-bright);background:var(--violet-dim);border:1px solid rgba(139,92,246,.3);border-radius:4px;padding:2px 8px}
.week-title{font-size:12px;font-weight:600;color:var(--text-secondary);letter-spacing:.04em}
.week-completion{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text-muted)}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}

/* ── DAY CARD ── */
.day-card{position:relative;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:8px 7px;cursor:pointer;transition:all .18s ease;min-height:72px;display:flex;flex-direction:column;gap:4px;overflow:hidden}
.day-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .18s ease;background:radial-gradient(ellipse at top left,var(--violet-pulse),transparent 70%)}
.day-card:hover::before{opacity:1}
.day-card:hover{border-color:var(--border-bright);transform:translateY(-1px);box-shadow:var(--shadow)}
.day-card.active{border-color:var(--amber);background:var(--bg-card-hover);box-shadow:0 0 0 1px var(--amber),0 0 16px var(--amber-glow)}
.day-card.active::before{opacity:1}
.day-card.completed{border-color:var(--emerald);background:rgba(16,185,129,.06)}
.day-card.completed::before{background:radial-gradient(ellipse at top left,rgba(16,185,129,.12),transparent 70%);opacity:1}
.day-card.prereq{border-color:rgba(6,182,212,.4)}
.day-card.revision{border-color:rgba(245,158,11,.3)}
.day-card.milestone{border-color:rgba(251,191,36,.6);background:rgba(251,191,36,.05)}
.day-num{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:.05em}
.day-card.active .day-num{color:var(--amber)}
.day-card.completed .day-num{color:var(--emerald)}
.day-label{font-size:9.5px;font-weight:500;color:var(--text-secondary);line-height:1.3;flex:1}
.day-card.active .day-label{color:var(--text-primary)}
.day-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.day-status-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);flex-shrink:0}
.day-card.active .day-status-dot{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.day-card.completed .day-status-dot{background:var(--emerald);box-shadow:0 0 6px var(--emerald)}
.day-card.prereq:not(.completed) .day-status-dot{background:var(--cyan)}
.day-card.revision:not(.completed) .day-status-dot{background:var(--amber)}
.day-card.milestone:not(.completed) .day-status-dot{background:#fbbf24;box-shadow:0 0 8px #fbbf24;animation:pulse-dot 1.5s infinite}
.day-check{width:14px;height:14px;border-radius:3px;border:1px solid var(--border-bright);background:transparent;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent}
.day-card.completed .day-check{background:var(--emerald);border-color:var(--emerald);color:#fff}

/* ── FOCUS PANE ── */
#focus-pane{overflow-y:auto;background:var(--bg-base);display:flex;flex-direction:column}
.focus-header{position:sticky;top:0;z-index:10;background:rgba(8,11,18,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 20px 12px}
.focus-date-badge{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--violet-bright);margin-bottom:6px}
.focus-day-title{font-size:16px;font-weight:700;color:var(--text-primary);line-height:1.3;margin-bottom:10px}
.focus-nav{display:flex;gap:6px}
.nav-btn{font-family:var(--mono);font-size:10px;font-weight:600;padding:4px 10px;border-radius:var(--radius-sm);border:1px solid var(--border-bright);background:var(--bg-elevated);color:var(--text-secondary);cursor:pointer;transition:all .15s ease;letter-spacing:.05em}
.nav-btn:hover{border-color:var(--violet-bright);color:var(--violet-bright);background:var(--violet-dim)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.focus-body{padding:16px 20px;display:flex;flex-direction:column;gap:14px;flex:1}

/* ── SECTION CARDS ── */
.section-card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.section-card-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
.section-icon{font-size:13px}
.section-title{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-secondary)}
.section-body{padding:12px 14px}
.phase-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;padding:3px 10px;border-radius:4px;margin-bottom:10px}
.phase-badge.phase-1{background:rgba(6,182,212,.15);color:var(--cyan);border:1px solid rgba(6,182,212,.3)}
.phase-badge.phase-2{background:var(--violet-dim);color:var(--violet-bright);border:1px solid rgba(139,92,246,.3)}
.phase-badge.phase-3{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.phase-badge.phase-m{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.4)}

/* ── CHECKLIST ── */
.checklist{display:flex;flex-direction:column;gap:6px}
.check-item{display:flex;align-items:flex-start;gap:8px;cursor:pointer;padding:6px 8px;border-radius:var(--radius-sm);transition:background .12s ease;border:1px solid transparent}
.check-item:hover{background:rgba(255,255,255,.03);border-color:var(--border)}
.check-item.done{opacity:.6}
.check-item.done .check-box{background:var(--emerald);border-color:var(--emerald)}
.check-item.done .check-text{text-decoration:line-through;color:var(--text-muted)}
.check-item.done .check-box::after{content:'✓';font-size:9px;color:#fff;font-weight:700}
.check-box{flex-shrink:0;width:16px;height:16px;border-radius:3px;border:1px solid var(--border-bright);background:transparent;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s ease}
.check-text{font-size:12px;color:var(--text-secondary);line-height:1.4}

/* ── PROBLEM LIST ── */
.problem-list{display:flex;flex-direction:column;gap:6px}
.problem-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s ease}
.problem-item:hover{border-color:var(--violet-bright);background:var(--bg-card-hover)}
.problem-item.done{border-color:var(--emerald);background:rgba(16,185,129,.05)}
.problem-item.done .problem-name{text-decoration:line-through;color:var(--text-muted)}
.problem-item.done .p-check{background:var(--emerald);border-color:var(--emerald);color:#fff}
.p-check{flex-shrink:0;width:18px;height:18px;border-radius:4px;border:1px solid var(--border-bright);background:transparent;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-top:1px;transition:all .15s ease}
.problem-name{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text-primary);flex:1}
.problem-tag{font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:3px;background:var(--violet-dim);color:var(--violet-bright);border:1px solid rgba(139,92,246,.2);white-space:nowrap}
.req-knowledge{font-size:11.5px;color:var(--text-secondary);line-height:1.5;padding:8px 10px;background:rgba(124,58,237,.07);border-left:2px solid var(--violet);border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-bottom:8px}
.req-label{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--violet-bright);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}

/* ── BUTTONS ── */
.complete-btn{width:100%;padding:12px;border-radius:var(--radius);border:none;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.08em;cursor:pointer;transition:all .2s ease;display:flex;align-items:center;justify-content:center;gap:8px;text-transform:uppercase}
.complete-btn.pending{background:linear-gradient(135deg,var(--violet),var(--violet-glow));color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.4)}
.complete-btn.pending:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(124,58,237,.6)}
.complete-btn.done-state{background:rgba(16,185,129,.15);color:var(--emerald);border:1px solid rgba(16,185,129,.4)}
.unmark-btn{padding:8px 14px!important;border-color:rgba(245,158,11,.4)!important;color:var(--amber)!important;flex-shrink:0;font-size:10px!important;background:rgba(245,158,11,.07)!important}
.unmark-btn:hover{background:rgba(245,158,11,.15)!important;border-color:var(--amber)!important}

/* ── SCRATCHPAD ── */
.scratchpad{width:100%;min-height:90px;resize:vertical;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-secondary);font-family:var(--mono);font-size:11px;line-height:1.6;padding:10px 12px;transition:border-color .15s ease;outline:none}
.scratchpad:focus{border-color:var(--violet-bright)}
.scratchpad::placeholder{color:var(--text-dim)}
/* ── CODE PANEL ── */
.code-panel{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.code-panel-header{display:flex;align-items:center;border-bottom:1px solid var(--border)}
.lang-tab{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;padding:8px 16px;cursor:pointer;transition:all .15s ease;border:none;background:transparent;text-transform:uppercase;border-bottom:2px solid transparent;margin-bottom:-1px}
.lang-tab.py{color:rgba(59,130,246,.5)}
.lang-tab.py.active{color:#3b82f6;border-bottom-color:#3b82f6;background:rgba(59,130,246,.06)}
.lang-tab.cpp{color:rgba(249,115,22,.5)}
.lang-tab.cpp.active{color:#f97316;border-bottom-color:#f97316;background:rgba(249,115,22,.06)}
.lang-tab:hover{background:rgba(255,255,255,.04)}
.code-lang-label{font-family:var(--mono);font-size:9px;color:var(--text-muted);margin-left:auto;padding-right:14px;letter-spacing:.06em}
.code-block{display:none;padding:12px 14px;overflow-x:auto;max-height:340px}
.code-block.active{display:block}
.code-block pre{font-family:var(--mono);font-size:10.5px;line-height:1.75;color:#c9d1d9;white-space:pre;margin:0}
.kw{color:#ff79c6}.fn{color:#50fa7b}.cm{color:#6272a4;font-style:italic}.st{color:#f1fa8c}.nm{color:#bd93f9}.tp{color:#8be9fd}
.info-box{padding:10px 12px;border-radius:var(--radius);font-size:11.5px;line-height:1.5}
.info-box.cyan-box{background:rgba(6,182,212,.07);border:1px solid rgba(6,182,212,.2);color:#67e8f9}
.info-box.amber-box{background:var(--amber-dim);border:1px solid rgba(245,158,11,.25);color:#fcd34d}
.info-box.gold-box{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.35);color:#fde68a}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;gap:12px;flex:1}
.empty-icon{font-size:40px;opacity:.4}
.empty-text{font-family:var(--mono);font-size:12px;color:var(--text-muted)}
.bridge-panel{background:var(--bg-elevated);border:1px solid rgba(232,121,249,.3);border-radius:var(--radius-lg);overflow:hidden}
.bridge-panel-header{display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:10px 14px;border-bottom:1px solid rgba(232,121,249,.2);background:rgba(232,121,249,.04)}
.bridge-panel-title{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#e879f9}
.bridge-legend{display:flex;gap:8px;margin-left:auto}
.bl-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.bl-dot.unseen{background:#475569}
.bl-dot.familiar{background:#f59e0b}
.bl-dot.nailed{background:#10b981}
.bl-label{font-family:var(--mono);font-size:9px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.bridge-card{border-bottom:1px solid var(--border);padding:10px 14px;transition:background .12s}
.bridge-card:last-child{border-bottom:none}
.bridge-card:hover{background:rgba(232,121,249,.03)}
.bridge-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.bridge-concept{flex:1;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text-primary);line-height:1.4;min-width:0}
.bridge-tag{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;border:1px solid rgba(232,121,249,.3);background:rgba(232,121,249,.08);color:#e879f9;white-space:nowrap;flex-shrink:0}
.bridge-states{display:flex;gap:3px;flex-shrink:0}
.state-btn{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.03em;width:26px;height:24px;border-radius:4px;border:1px solid var(--border-bright);background:transparent;cursor:pointer;transition:all .14s ease;color:var(--text-dim);display:flex;align-items:center;justify-content:center}
.state-btn:hover{border-color:var(--border-bright);color:var(--text-secondary)}
.state-btn.unseen.active{background:rgba(71,85,105,.25);border-color:#64748b;color:#94a3b8}
.state-btn.familiar.active{background:rgba(245,158,11,.18);border-color:var(--amber);color:var(--amber);box-shadow:0 0 6px rgba(245,158,11,.2)}
.state-btn.nailed.active{background:rgba(16,185,129,.18);border-color:var(--emerald);color:var(--emerald);box-shadow:0 0 6px rgba(16,185,129,.2)}
.bridge-compare{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:6px}
.bridge-col-label{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border-radius:4px 4px 0 0}
.bridge-col-label.python{color:#3b82f6;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-bottom:none}
.bridge-col-label.cpp{color:#f97316;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.2);border-bottom:none}
.bridge-code{background:var(--bg-base);border-radius:0 0 4px 4px;padding:8px 9px;overflow-x:auto;max-height:200px}
.bridge-code.python{border:1px solid rgba(59,130,246,.2);border-top:none}
.bridge-code.cpp{border:1px solid rgba(249,115,22,.2);border-top:none}
.bridge-code pre{font-family:var(--mono);font-size:10px;line-height:1.65;color:#c9d1d9;white-space:pre;margin:0}
.bridge-gotcha{margin-top:7px;padding:6px 10px;border-radius:4px;background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.2);font-family:var(--mono);font-size:10px;color:#fda4af;line-height:1.5}
.bridge-gotcha-label{color:#f43f5e;font-weight:700;font-size:9px;letter-spacing:.08em;display:block;margin-bottom:2px}
.bridge-progress-wrap{flex:1;height:3px;background:var(--border);border-radius:99px;overflow:hidden;min-width:40px}
.bridge-progress-fill{height:100%;background:linear-gradient(90deg,var(--amber),#e879f9);border-radius:99px;transition:width .5s ease}
.bridge-stats-label{font-family:var(--mono);font-size:9px;color:var(--text-muted);white-space:nowrap}
.phase-badge.phase-5{background:rgba(232,121,249,.13);color:#e879f9;border:1px solid rgba(232,121,249,.35)}

@keyframes fade-in-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.anim-in{animation:fade-in-up .22s ease forwards}
@media(max-width:900px){#main-layout{grid-template-columns:1fr;height:auto;overflow:visible}#calendar-pane{border-right:none;border-bottom:1px solid var(--border)}#focus-pane{height:auto;min-height:600px}.week-grid{grid-template-columns:repeat(5,1fr)}.header-stats{display:none}}
@media(max-width:480px){.week-grid{grid-template-columns:repeat(4,1fr)}#calendar-pane,.focus-body{padding:12px}}
</style>
</head>
<body>

<header id="app-header">
  <div class="header-brand">
    <div class="brand-icon">⚡</div>
    <div class="brand-title">DSA<span>Quest</span> :: Master Timeline</div>
  </div>
  <div class="header-stats">
    <div class="stat-pill"><span class="dot"></span><span id="stat-days">0 / 40 days</span></div>
    <div class="stat-pill">🎯 <span id="stat-pct">0%</span></div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="global-progress" style="width:0%"></div></div>
  </div>
</header>

<div id="main-layout">
  <div id="calendar-pane"></div>
  <div id="focus-pane">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">📅</div>
      <div class="empty-text">// SELECT A DAY TO LOAD THE FOCUS PANEL</div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   TIMELINE MATRIX — June 5 to July 14, 2026 (40 days)
   Full DSA curriculum compressed into 40 days.
   Topics: Arrays → Strings → Linked Lists → Stacks/Queues
           → Binary Search → Trees → Backtracking
           → Dynamic Programming → Graphs + Bitwise

        n>>=1;
    }
    return res;
}`,gotcha:"Right-shifting a SIGNED negative integer in C++ is implementation-defined (arithmetic or logical shift). Always use unsigned types (uint32_t) for bit manipulation problems. Python's >> is always arithmetic. Use uint32_t for #190 Reverse Bits, not int."},
      {concept:"n & (n-1) \u2014 clear lowest set bit",tag:"Bit Tricks",py:`# Python — Hamming weight
count = 0
while n:
    n &= n-1   # clears lowest set bit
    count += 1
# Alternative: bin(n).count('1')
# Or: bin(n).count('1')  # O(log n)`,cpp:`// C++ — same trick, also __builtin_popcount
int hammingWeight(uint32_t n) {
    int count = 0;
    while(n){ n &= n-1; count++; }
    return count;
}
// Compiler intrinsic (fastest on modern CPUs):
return __builtin_popcount(n);  // GCC
// C++20: #include <bit>
return popcount(n);  // standard`,gotcha:"n & (n-1) clears the LOWEST set bit because subtracting 1 flips all bits from the lowest set bit downward. Proven: for n = ...1 0...0, n-1 = ...0 1...1, so n & (n-1) = ...0 0...0. C++ __builtin_popcount is a single CPU instruction on x86 \u2014 far faster than the loop."}]
  }
];

/* ════════════════════════════════════
   STORAGE ENGINE
════════════════════════════════════ */
const STORAGE_KEY='dsaTimelineV1';
function loadState(){try{const r=localStorage.getItem(STORAGE_KEY);const s=r?JSON.parse(r):{};return{completed:s.completed||{},checks:s.checks||{},notes:s.notes||{},bridge:s.bridge||{}}}catch(e){return{completed:{},checks:{},notes:{},bridge:{}}}}
function saveState(s){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s))}catch(e){}}

let STATE=loadState();
let currentDayId=null;
let activeLang=localStorage.getItem('dsaLang')||'py';
function setLang(lang){activeLang=lang;localStorage.setItem('dsaLang',lang);}

function getDayIndex(id){return TIMELINE_MATRIX.findIndex(d=>d.id===id)}
function getDayById(id){return TIMELINE_MATRIX.find(d=>d.id===id)}
function getWeekInfo(wNum){const days=TIMELINE_MATRIX.filter(d=>d.week===wNum);const done=days.filter(d=>STATE.completed[d.id]).length;return{total:days.length,done}}
function getGlobalStats(){const total=TIMELINE_MATRIX.length;const done=Object.values(STATE.completed).filter(Boolean).length;return{total,done,pct:Math.round((done/total)*100)}}

function updateHeaderStats(){
  const{total,done,pct}=getGlobalStats();
  document.getElementById('stat-days').textContent=`${done} / ${total} days`;
  document.getElementById('stat-pct').textContent=`${pct}%`;
  document.getElementById('global-progress').style.width=pct+'%';
}

/* ════════════════════════════════════
   RENDER CALENDAR
════════════════════════════════════ */
function renderCalendar(){
  const pane=document.getElementById('calendar-pane');
  pane.innerHTML='';
  const weeks=[...new Set(TIMELINE_MATRIX.map(d=>d.week))];
  const weekNames={1:'Arrays',2:'Strings + Linked Lists',3:'Linked Lists + Stacks/Queues',4:'Binary Search + Trees',5:'Backtracking + DP',6:'DP + Graphs + Bitwise'};
  weeks.forEach(wNum=>{
    const days=TIMELINE_MATRIX.filter(d=>d.week===wNum);
    const{done,total}=getWeekInfo(wNum);
    const wb=document.createElement('div');wb.className='week-block';
    const wh=document.createElement('div');wh.className='week-header';
    wh.innerHTML=`<span class="week-badge">WK ${wNum}</span><span class="week-title">${weekNames[wNum]||''}</span><span class="week-completion">${done}/${total}</span>`;
    const grid=document.createElement('div');grid.className='week-grid';
    days.forEach(day=>{
      const isCompleted=!!STATE.completed[day.id];
      const isActive=day.id===currentDayId;
      const card=document.createElement('div');
      card.className='day-card'+(isActive?' active':'')+(isCompleted?' completed':'')+(day.type==='prereq'?' prereq':'')+(day.type==='revision'?' revision':'')+(day.type==='milestone'?' milestone':'');
      card.innerHTML=`<div class="day-num">${day.date}</div><div class="day-label">${day.label}</div><div class="day-footer"><div class="day-status-dot"></div><div class="day-check">${isCompleted?'✓':''}</div></div>`;
      card.addEventListener('click',()=>selectDay(day.id));
      grid.appendChild(card);
    });
    wb.appendChild(wh);wb.appendChild(grid);pane.appendChild(wb);
  });
}

/* ════════════════════════════════════
   RENDER FOCUS PANEL
════════════════════════════════════ */
function renderFocusPanel(dayId){
  const day=getDayById(dayId);
  if(!day)return;
  const pane=document.getElementById('focus-pane');
  const idx=getDayIndex(dayId);
  const isCompleted=!!STATE.completed[dayId];
  const hasPrev=idx>0, hasNext=idx<TIMELINE_MATRIX.length-1;

  const phaseMap={
    1:['phase-1','◈ PHASE 1 — PREREQUISITE STUDY'],
    2:['phase-2','◈ PHASE 2 — TARGETED PROBLEM SOLVING'],
    3:['phase-3','◈ PHASE 3 — TOPIC COMPLETION REVISION'],
    4:['phase-m','👑 FINAL MILESTONE'],
    5:['phase-5','⚡ PHASE 5 — C++ LANGUAGE BRIDGING']
  };
  const[phaseClass,phaseLabel]=phaseMap[day.phase]||phaseMap[2];
  let b=`<div class="phase-badge ${phaseClass}">${phaseLabel}</div>`;

  if(day.summary){
    b+=`<div class="section-card"><div class="section-card-header"><span class="section-icon">💡</span><span class="section-title">Day Overview</span></div><div class="section-body"><p style="font-size:12.5px;color:var(--text-secondary);line-height:1.6">${day.summary}</p></div></div>`;
  }

  if(day.prereqs&&day.prereqs.length>0){
    const lid=dayId+'_prereq';
    const sc=STATE.checks[lid]||{};
    const icon=day.type==='prereq'?'📚':day.type==='milestone'?'🏆':'🔄';
    const stitle=day.type==='prereq'?'Study Checklist':day.type==='milestone'?'Achievements Unlocked':'Revision Checklist';
    const items=day.prereqs.map((item,i)=>{
      const done=!!sc[i];
      return`<div class="check-item${done?' done':''}" onclick="toggleCheck('${lid}',${i})"><div class="check-box"></div><span class="check-text">${item}</span></div>`;
    }).join('');
    b+=`<div class="section-card"><div class="section-card-header"><span class="section-icon">${icon}</span><span class="section-title">${stitle}</span></div><div class="section-body"><div class="checklist">${items}</div></div></div>`;
  }

  if(day.reqKnowledge){
    b+=`<div class="section-card"><div class="section-card-header"><span class="section-icon">🔑</span><span class="section-title">Required Knowledge</span></div><div class="section-body"><div class="req-knowledge"><div class="req-label">▸ PREREQUISITE CONCEPT</div>${day.reqKnowledge}</div></div></div>`;
  }

  if(day.problems&&day.problems.length>0){
    const lid=dayId+'_problems';
    const sc=STATE.checks[lid]||{};
    const probs=day.problems.map((p,i)=>{
      const done=!!sc[i];
      return`<div class="problem-item${done?' done':''}" onclick="toggleCheck('${lid}',${i})"><div class="p-check">${done?'✓':p.lc}</div><span class="problem-name">${p.name}</span><span class="problem-tag">${p.tag}</span></div>`;
    }).join('');
    b+=`<div class="section-card"><div class="section-card-header"><span class="section-icon">⚔️</span><span class="section-title">Targeted Problem Roster</span></div><div class="section-body"><div class="problem-list">${probs}</div></div></div>`;
  }

  if(day.benchmarks&&day.benchmarks.length>0){
    const bms=day.benchmarks.map(bm=>`<div style="font-size:11.5px;color:var(--text-secondary);padding:5px 0;border-bottom:1px solid var(--border);line-height:1.5">▸ ${bm}</div>`).join('');
    b+=`<div class="section-card"><div class="section-card-header"><span class="section-icon">🏋️</span><span class="section-title">Mastery Benchmarks</span></div><div class="section-body">${bms}</div></div>`;
  }

  // Code panel (Python + C++)
  if(day.code&&(day.code.py||day.code.cpp)){
    const pyActive=activeLang==='py'?'active':'';
    const cppActive=activeLang==='cpp'?'active':'';
    b+=`<div class="code-panel">
      <div class="code-panel-header">
        <button class="lang-tab py ${pyActive}" onclick="switchLang('py','${dayId}')">🐍 Python</button>
        <button class="lang-tab cpp ${cppActive}" onclick="switchLang('cpp','${dayId}')">⚡ C++</button>
        <span class="code-lang-label">KEY PATTERNS &amp; IMPLEMENTATIONS</span>
      </div>
      <div class="code-block ${pyActive}" id="code-py-${dayId}"><pre>${day.code.py||''}</pre></div>
      <div class="code-block ${cppActive}" id="code-cpp-${dayId}"><pre>${day.code.cpp||''}</pre></div>
    </div>`;
  }

  // ── C++ Language Bridge Panel ──
  if(day.bridge&&day.bridge.length>0){
    const bridgeKey=dayId+'_bridge';
    const bs=STATE.bridge[bridgeKey]||{};
    const nailed=Object.values(bs).filter(v=>v==='nailed').length;
    const familiar=Object.values(bs).filter(v=>v==='familiar').length;
    const total=day.bridge.length;
    const pct=total?Math.round((nailed/total)*100):0;
    let cards=day.bridge.map((c,i)=>{
      const state=bs[i]||'unseen';
      const sU=state==='unseen'?'active':'';
      const sF=state==='familiar'?'active':'';
      const sN=state==='nailed'?'active':'';
      const cardBorder=state==='nailed'?'border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.03)':state==='familiar'?'border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.02)':'';
      return`<div class="bridge-card" style="${cardBorder}">
        <div class="bridge-top">
          <div class="bridge-concept">${c.concept}</div>
          <span class="bridge-tag">${c.tag}</span>
          <div class="bridge-states">
            <button class="state-btn unseen ${sU}" onclick="setBridgeState('${bridgeKey}',${i},'unseen','${dayId}')" title="Not yet studied">?</button>
            <button class="state-btn familiar ${sF}" onclick="setBridgeState('${bridgeKey}',${i},'familiar','${dayId}')" title="Familiar">~</button>
            <button class="state-btn nailed ${sN}" onclick="setBridgeState('${bridgeKey}',${i},'nailed','${dayId}')" title="Nailed it">✓</button>
          </div>
        </div>
        <div class="bridge-compare">
          <div>
            <div class="bridge-col-label python">🐍 Python / Your Base</div>
            <div class="bridge-code python"><pre>${c.py}</pre></div>
          </div>
          <div>
            <div class="bridge-col-label cpp">⚡ Modern C++</div>
            <div class="bridge-code cpp"><pre>${c.cpp}</pre></div>
          </div>
        </div>
        <div class="bridge-gotcha"><div class="bridge-gotcha-label">⚠ GOTCHA</div>${c.gotcha}</div>
      </div>`;
    }).join('');
    b+=`<div class="bridge-panel">
      <div class="bridge-panel-header">
        <span class="section-icon">⚡</span>
        <span class="bridge-panel-title">C++ Language Bridge</span>
        <div class="bridge-progress-wrap"><div class="bridge-progress-fill" style="width:${pct}%"></div></div>
        <span class="bridge-stats-label">${nailed}/${total} nailed · ${familiar} familiar</span>
        <div class="bridge-legend">
          <span class="bl-label"><span class="bl-dot unseen"></span>unseen</span>
          <span class="bl-label"><span class="bl-dot familiar"></span>familiar</span>
          <span class="bl-label"><span class="bl-dot nailed"></span>nailed</span>
        </div>
      </div>
      ${cards}
    </div>`;
  }

  if(day.revision){
    const bc=day.type==='prereq'?'cyan-box':day.type==='milestone'?'gold-box':'amber-box';
    b+=`<div class="info-box ${bc}">📝 ${day.revision}</div>`;
  }

  if(isCompleted){
    b+=`<div style="display:flex;gap:8px;align-items:stretch">
      <button class="complete-btn done-state" style="flex:1;cursor:default">✅ DAY COMPLETED</button>
      <button class="nav-btn unmark-btn" onclick="toggleDayComplete('${dayId}')" title="Unmark as completed">↩ UNMARK</button>
    </div>`;
  } else {
    b+=`<button class="complete-btn pending" onclick="toggleDayComplete('${dayId}')">⚡ MARK DAY AS COMPLETED</button>`;
  }

  const note=STATE.notes[dayId]||'';
  b+=`<div class="section-card"><div class="section-card-header"><span class="section-icon">✏️</span><span class="section-title">Daily Revision Scratchpad</span></div><div class="section-body"><textarea class="scratchpad" placeholder="// Write edge cases, approach notes, complexity analysis, interview tips..." oninput="saveNote('${dayId}',this.value)">${note}</textarea></div></div>`;

  pane.innerHTML=`
    <div class="focus-header">
      <div class="focus-date-badge">📅 ${day.date} — Week ${day.week} of 6</div>
      <div class="focus-day-title">${day.label}</div>
      <div class="focus-nav">
        <button class="nav-btn" onclick="navigateDay(-1)" ${!hasPrev?'disabled':''}>← PREV</button>
        <button class="nav-btn" onclick="navigateDay(1)" ${!hasNext?'disabled':''}>NEXT →</button>
      </div>
    </div>
    <div class="focus-body anim-in">${b}</div>`;
}

/* ════════════════════════════════════
   INTERACTIONS
════════════════════════════════════ */
function switchLang(lang, dayId){
  setLang(lang);
  document.querySelectorAll('.lang-tab').forEach(t=>{
    t.classList.toggle('active', t.classList.contains(lang));
  });
  const py=document.getElementById('code-py-'+dayId);
  const cpp=document.getElementById('code-cpp-'+dayId);
  if(py)  py.classList.toggle('active', lang==='py');
  if(cpp) cpp.classList.toggle('active', lang==='cpp');
}

function setBridgeState(bridgeKey, idx, newState, dayId){
  if(!STATE.bridge[bridgeKey]) STATE.bridge[bridgeKey]={};
  // 3-state cycle: unseen → familiar → nailed → unseen
  const cur=STATE.bridge[bridgeKey][idx]||'unseen';
  if(newState===cur){
    // clicking same state cycles forward
    const cycle={unseen:'familiar',familiar:'nailed',nailed:'unseen'};
    STATE.bridge[bridgeKey][idx]=cycle[cur];
  } else {
    STATE.bridge[bridgeKey][idx]=newState;
  }
  saveState(STATE);
  updateBridgeStat();
  renderFocusPanel(dayId);
}

function updateBridgeStat(){
  let nailed=0;
  Object.values(STATE.bridge).forEach(dayBridge=>{
    Object.values(dayBridge).forEach(v=>{ if(v==='nailed') nailed++; });
  });
  const el=document.getElementById('bridge-stat');
  if(el) el.textContent=nailed+' nailed';
}

function selectDay(dayId){
  currentDayId=dayId;
  document.getElementById('empty-state')?.remove();
  renderFocusPanel(dayId);
  renderCalendar();
  setTimeout(()=>{const a=document.querySelector('.day-card.active');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest'})},50);
}

function navigateDay(delta){
  const ni=getDayIndex(currentDayId)+delta;
  if(ni>=0&&ni<TIMELINE_MATRIX.length){
    selectDay(TIMELINE_MATRIX[ni].id);
    document.getElementById('focus-pane').scrollTo({top:0,behavior:'smooth'});
  }
}

function toggleCheck(lid,idx){
  if(!STATE.checks[lid])STATE.checks[lid]={};
  STATE.checks[lid][idx]=!STATE.checks[lid][idx];
  saveState(STATE);
  renderFocusPanel(currentDayId);
}

function saveNote(dayId,val){
  STATE.notes[dayId]=val;
  saveState(STATE);
}

function toggleDayComplete(dayId){
  const wasCompleted=!!STATE.completed[dayId];
  STATE.completed[dayId]=!wasCompleted;
  saveState(STATE);
  if(!wasCompleted)fireConfetti();
  renderCalendar();
  renderFocusPanel(dayId);
  updateHeaderStats();
  updateBridgeStat();
}

function fireConfetti(){
  const colors=['#7c3aed','#8b5cf6','#10b981','#f59e0b','#06b6d4','#f43f5e'];
  const opts={particleCount:120,spread:90,colors};
  confetti({...opts,angle:60,origin:{x:.1,y:.55}});
  confetti({...opts,angle:120,origin:{x:.9,y:.55}});
  setTimeout(()=>confetti({...opts,particleCount:60,origin:{y:.4}}),200);
}

/* ════════════════════════════════════
   BOOTSTRAP
════════════════════════════════════ */
function init(){
  renderCalendar();
  updateHeaderStats();
  updateBridgeStat();
  const today=new Date();
  const todayId=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const todayDay=getDayById(todayId);
  if(todayDay){
    selectDay(todayId);
    setTimeout(()=>{const a=document.querySelector('.day-card.active');if(a)a.scrollIntoView({behavior:'smooth',block:'center'})},100);
  }
}
init();
</script>
</body>
</html>
